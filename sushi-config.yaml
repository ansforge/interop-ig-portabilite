# Documentation à propos de cette page : https://fshschool.org/docs/sushi/configuration/

id: ans.fhir.fr.pdlgc
canonical: https://interop.esante.gouv.fr/ig/fhir/pdlgc
name: PDLGC
title: Portabilité des Données LGC
description: Architecture d'archive de portabilité des données LGC
publisher:
  name: Agence du Numérique en Santé (ANS) - 2-10 Rue d'Oradour-sur-Glane, 75015 Paris
  url: https://esante.gouv.fr
status: draft
version: 1.0.0
fhirVersion: 4.0.1
copyrightYear: 2020+
# releaseLabel: trial-use
releaseLabel: draft

jurisdiction: urn:iso:std:iso:3166#FR "France (la)"

parameters: #Parameters list - https://build.fhir.org/ig/FHIR/fhir-tools-ig/CodeSystem-ig-parameters.html
    shownav: 'true'
    path-expansion-params: '../../expansion-params.json' # for using French SNOMED CT Extension
    pin-canonicals: pin-all
    apply-contact: true
    logging:
      - tx #tx: Messages describing the use of the terminology server (for debugging)
      - html #html: Log when validating an html page (troubleshooting only - leave off)
      - generate #generate: Log when producing an individual resource (troubleshooting only - leave off)
      - init #init: Messages describing the start up process (for debugging)
      - progress #progress: Overall progress messages
    i18n-default-lang: fr # Default language
    apply-jurisdiction: true
    i18n-lang:
      - en
    translation-sources:
      - input/translations/en


pages:
    index.md:
        title: Accueil
    spec-fonctionnelle-intro.md:
        title: Contexte fonctionnel et périmètre
    spec-technique-intro.md:
        title: Introduction technique
        spec-technique-vue-ensemble.md:
            title: Structure de l'archive
        spec-technique-flux-alimentation.md:
            title: Flux d'export
        spec-technique-flux-consommation.md:
            title: Flux d'import
    change-log.md:
        title: Historique des versions
    autres_ressources.md:
        title: Annexes
        annexe-securite.md:
            title: Sécurité
        annexe-downloads.md:
            title: Téléchargements
    translationinfo.md:
        title: Informations sur la traduction

menu:
    Accueil: index.html
    "Vol. 1 - Étude fonctionnelle":
        "Contexte et périmètre": spec-fonctionnelle-intro.html
    "Vol. 2 - Spécifications techniques":
        "Introduction": spec-technique-intro.html
        "Structure de l'archive": spec-technique-vue-ensemble.html
        "Flux d'export": spec-technique-flux-alimentation.html
        "Flux d'import": spec-technique-flux-consommation.html
    "Vol. 3 - Annexes":
        "Sécurité": annexe-securite.html
        "Téléchargements": annexe-downloads.html
        "Spécifications FHIR": new-tab {{site.data.fhir.path}}index.html
        "Site de l'ANS": new-tab https://esante.gouv.fr/
    "Ressources de conformité": artifacts.html
    "Documentation": new-tab https://interop.esante.gouv.fr/ig/documentation/
    "Historique": change-log.html
